name: 外部 API 触发创建 Issue

on:
  repository_dispatch:
    types: [create-issue]

# 🔥 必须加：给 Action 开 Issue 写入权限
permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: 创建 Issue
        uses: actions/github-script@v8  # 🔥 v8 解决 Node.js 20 警告
        with:
          script: |
            const { title, body } = context.payload.client_payload;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body
            });
name: 外部 API 触发创建 Issue（仅支持 GitHub App 调用）

on:
  repository_dispatch:
    types:
      - create-issue

# 显式声明权限，确保 GitHub App 有写入 Issue 的权限
permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: 使用传入参数创建 Issue
        uses: actions/github-script@v7
        with:
          script: |
            const { title, body } = context.payload.client_payload;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body
            });